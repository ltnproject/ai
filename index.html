<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f23;
            --bg-surface: #1a1a2e;
            --bg-elevated: #222240;
            --accent: #00ff88;
            --accent-dim: #00ff8833;
            --text-primary: #e0e0ff;
            --text-secondary: #8888aa;
            --border: #2a2a4a;
            --error: #ff4466;
            --warning: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, var(--accent-dim) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(255, 68, 255, 0.1) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Header */
        header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #00ddff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .settings-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            border-color: var(--accent);
            background: var(--bg-surface);
        }

        /* Main container */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar.hidden {
            display: none;
        }

        .config-section {
            margin-bottom: 2rem;
        }

        .config-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        input[type="password"],
        select,
        input[type="number"] {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.7rem;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .slider-container {
            margin-top: 1rem;
        }

        .slider-value {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--bg-elevated);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Chat area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 1.5rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .role-badge {
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .role-user {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .role-assistant {
            background: rgba(100, 100, 255, 0.2);
            color: #aaaaff;
        }

        .message-content {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            border-left: 3px solid var(--accent);
        }

        .message.assistant .message-content {
            border-left: 3px solid #6666ff;
        }

        /* Input area */
        .input-container {
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 1.5rem 2rem;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        #messageInput {
            flex: 1;
            min-height: 60px;
            max-height: 200px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 1rem;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            resize: vertical;
            transition: all 0.2s;
        }

        #messageInput:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .send-btn {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px var(--accent-dim);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-btn {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            color: var(--error);
            border-color: var(--error);
        }

        /* Loading indicator */
        .loading {
            display: inline-flex;
            gap: 4px;
            padding: 1rem;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Error message */
        .error-message {
            background: rgba(255, 68, 102, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease-out;
        }

        /* Welcome screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 2rem;
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .welcome-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent), #00ddff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-text {
            color: var(--text-secondary);
            max-width: 500px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -300px;
                height: 100%;
                z-index: 100;
                transition: left 0.3s;
            }

            .sidebar.visible {
                left: 0;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .send-btn,
            .clear-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">⚡ AI Chat</div>
        <button class="settings-btn" onclick="toggleSidebar()">⚙️ Settings</button>
    </header>

    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <div class="config-section">
                <div class="config-label">API Configuration</div>
                <input type="password" id="apiKey" placeholder="Enter your API key" />
            </div>

            <div class="config-section">
                <div class="config-label">API Endpoint</div>
                <input type="text" id="apiEndpoint" value="https://api.apifree.ai/v1/chat/completions" />
            </div>

            <div class="config-section">
                <div class="config-label">Model</div>
                <select id="modelSelect">
                    <option value="anthropic/claude-sonnet-4.5" selected>Claude Sonnet 4.5</option>
                    <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                    <option value="openai/gpt-4">GPT-4</option>
                    <option value="openai/gpt-4-turbo">GPT-4 Turbo</option>
                    <option value="openai/gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    <option value="google/gemini-pro">Gemini Pro</option>
                </select>
            </div>

            <div class="config-section">
                <div class="config-label">System Prompt</div>
                <textarea id="systemPrompt" rows="4" style="width: 100%; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary); padding: 0.7rem; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; resize: vertical;">You are a helpful AI assistant.</textarea>
            </div>

            <div class="config-section">
                <div class="config-label">Temperature</div>
                <div class="slider-container">
                    <div class="slider-value">
                        <span>Precise</span>
                        <span id="tempValue">1.0</span>
                        <span>Creative</span>
                    </div>
                    <input type="range" id="temperature" min="0" max="2" step="0.1" value="1.0" oninput="updateTemp(this.value)" />
                </div>
            </div>

            <div class="config-section">
                <div class="config-label">Max Tokens</div>
                <input type="number" id="maxTokens" value="8192" min="1" max="32000" />
            </div>
        </aside>

        <div class="chat-container">
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen">
                    <div class="welcome-icon">🤖</div>
                    <div class="welcome-title">Ready to Chat</div>
                    <p class="welcome-text">Configure your API settings in the sidebar and start chatting with AI</p>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Type your message here..." onkeydown="handleKeyPress(event)"></textarea>
                    <button class="clear-btn" onclick="clearChat()">Clear</button>
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let messages = [];
        let isLoading = false;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('visible');
        }

        function updateTemp(value) {
            document.getElementById('tempValue').textContent = value;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function clearChat() {
            if (confirm('Clear all messages?')) {
                messages = [];
                renderMessages();
            }
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="welcome-screen">
                        <div class="welcome-icon">🤖</div>
                        <div class="welcome-title">Ready to Chat</div>
                        <p class="welcome-text">Configure your API settings in the sidebar and start chatting with AI</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.role}">
                    <div class="message-header">
                        <span class="role-badge role-${msg.role}">${msg.role}</span>
                    </div>
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                </div>
            `).join('');

            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const container = document.getElementById('messagesContainer');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            container.appendChild(errorDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showLoading() {
            const container = document.getElementById('messagesContainer');
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loadingIndicator';
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `
                <div class="message-header">
                    <span class="role-badge role-assistant">assistant</span>
                </div>
                <div class="message-content">
                    <div class="loading">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideLoading() {
            const loading = document.getElementById('loadingIndicator');
            if (loading) loading.remove();
        }

        async function sendMessage() {
            if (isLoading) return;

            const input = document.getElementById('messageInput');
            const userMessage = input.value.trim();
            
            if (!userMessage) return;

            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                alert('Please enter your API key in the settings');
                return;
            }

            // Add user message
            messages.push({ role: 'user', content: userMessage });
            input.value = '';
            renderMessages();

            // Show loading
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            showLoading();

            try {
                const endpoint = document.getElementById('apiEndpoint').value;
                const model = document.getElementById('modelSelect').value;
                const systemPrompt = document.getElementById('systemPrompt').value;
                const temperature = parseFloat(document.getElementById('temperature').value);
                const maxTokens = parseInt(document.getElementById('maxTokens').value);

                // Prepare messages with system prompt
                const apiMessages = [
                    { role: 'system', content: systemPrompt },
                    ...messages
                ];

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: apiMessages,
                        temperature: temperature,
                        max_tokens: maxTokens,
                        stream: false
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API request failed');
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;

                // Add assistant response
                messages.push({ role: 'assistant', content: assistantMessage });
                hideLoading();
                renderMessages();

            } catch (error) {
                hideLoading();
                showError(`Error: ${error.message}`);
                console.error('API Error:', error);
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // Initialize
        renderMessages();
    </script>
</body>
</html>
